version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: linkedin_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: linkedin_simulation
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  mongo:
    image: mongo:7
    container_name: linkedin_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: linkedin_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: linkedin_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build: .
    container_name: linkedin_m3m4_backend
    restart: unless-stopped
    depends_on:
      - mysql
      - mongo
      - kafka
    env_file:
      - .env.example
    ports:
      - "8000:8000"

  consumer:
    build: .
    container_name: linkedin_m3m4_consumer
    restart: unless-stopped
    depends_on:
      - mongo
      - kafka
    env_file:
      - .env.example
    command: ["python", "consumer.py"]

volumes:
  mysql_data:
  mongo_data:
