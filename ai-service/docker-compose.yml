services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ai_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ai_kafka
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 60s
    ports:
      # PLAINTEXT_HOST listens on 9093 in-container; publish both so host clients work with either port.
      - "9093:9093"
      - "9092:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ai_zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ai_kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mongodb:
    image: mongo:7
    container_name: ai_mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"

  ai-service:
    build: .
    container_name: ai_service
    ports:
      - "8000:8000"
    # Allow the container to reach Job/Profile stubs started on the host
    # (`python scripts/mock_downstream_services.py`). Linux: requires Compose v2+.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Optional: copy `.env.example` to `.env` for secrets (e.g. GROQ_API_KEY).
    # Infrastructure URLs below override `.env` so in-network hostnames stay correct.
    env_file:
      - path: .env
        required: false
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ai_kafka:9092
      # Use Compose *service* names for DNS (not container_name).
      MONGO_URI: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379
      # Override `.env` loopback URLs: inside the container, 127.0.0.1 is this container,
      # not your laptop. Point at stubs listening on the host (ports 8001/8002).
      JOB_SERVICE_URL: http://host.docker.internal:8002
      PROFILE_SERVICE_URL: http://host.docker.internal:8001

volumes:
  mongo_data: