events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api-backend:8000;
    }

    upstream application_service {
        server application-service:8004;
    }

    upstream messaging_service {
        server messaging-service:8005;
    }

    upstream analytics_service {
        server analytics-service:8006;
    }

    upstream recruiter_assistant {
        server recruiter-assistant:8000;
    }

    server {
        listen 8080;
        
        location /nginx-health {
            access_log off;
            return 200 "nginx-healthy\n";
            add_header Content-Type text/plain;
        }

        # Health endpoints - direct routing without rewrite
        location = /api/health {
            proxy_pass http://api_backend/health;
        }
        
        location = /api/applications/health {
            proxy_pass http://application_service/health;
        }
        
        location = /api/messages/health {
            proxy_pass http://messaging_service/health;
        }
        
        location = /api/analytics/health {
            proxy_pass http://analytics_service/health;
        }

        location = /api/recruiter-assistant/health {
            proxy_pass http://recruiter_assistant/health;
        }

        # Recruiter Assistant (FastAPI /agent/* and WebSocket /ws/*)
        location /api/agent {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://recruiter_assistant;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
        }

        location /api/ws/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://recruiter_assistant;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
        }

        # FastAPI backend routes
        location /api/auth {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/members {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/recruiters {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/jobs {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/connections {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Application Service routes
        location /api/applications {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://application_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/notifications {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://application_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Messaging Service routes
        location /api/messages {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://messaging_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/threads {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://messaging_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Analytics Service routes
        location /api/analytics {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://analytics_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /api/events {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://analytics_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
