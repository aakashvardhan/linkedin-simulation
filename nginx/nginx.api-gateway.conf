# API gateway — single entry for the SPA (`VITE_API_BASE_URL=/api` → `http://<host>:8090/api/...`).
# Order: most-specific `location` prefixes first.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    sendfile     on;

    upstream api_backend {
        server api-backend:8000;
    }

    upstream application_service {
        server application-service:8004;
    }

    upstream messaging_service {
        server messaging-service:8005;
    }

    upstream analytics_service {
        server analytics-service:8006;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    server {
        listen 8080;
        server_name _;

        location = /nginx-health {
            default_type text/plain;
            return 200 "ok\n";
        }

        # Recruiter AI agent (FastAPI) — WebSocket progress
        location /api/ws/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_pass http://ai_service/ws/;
        }

        # Recruiter AI REST (`/agent/request`, `/agent/result/...`, etc.)
        location /api/agent/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_pass http://ai_service/agent/;
        }

        location /api/applications/ {
            proxy_set_header Host $host;
            proxy_pass http://application_service/applications/;
        }

        location /api/notifications/ {
            proxy_set_header Host $host;
            proxy_pass http://application_service/notifications/;
        }

        location /api/threads/ {
            proxy_set_header Host $host;
            proxy_pass http://messaging_service/threads/;
        }

        location /api/messages/ {
            proxy_set_header Host $host;
            proxy_pass http://messaging_service/messages/;
        }

        location /api/events/ {
            proxy_set_header Host $host;
            proxy_pass http://analytics_service/events/;
        }

        location /api/analytics/ {
            proxy_set_header Host $host;
            proxy_pass http://analytics_service/analytics/;
        }

        # Core FastAPI (members, recruiters, jobs, connections, auth, …)
        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://api_backend/;
        }
    }
}
